<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/src/assets/logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farmacia FarmaGen</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restaura una ruta enviada por el fallback del hosting antes de iniciar React.
      const redirectRoute = new URLSearchParams(window.location.search).get("route");
      if (redirectRoute) {
        const basePath = window.location.pathname.replace(/\/$/, "");
        window.history.replaceState(null, "", `${basePath}${redirectRoute}`);
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
